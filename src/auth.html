<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YaMusic Legacy — Вход</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="screen">
    <div class="logo-mark">
      <svg width="56" height="56" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L16.5 9.5H24.5L18.5 14L21 21.5L14 17L7 21.5L9.5 14L3.5 9.5H11.5L14 2Z" fill="#FFFF00" />
      </svg>
    </div>

    <h1 class="title">
      YaMusic <span>Legacy</span>
    </h1>

    <p class="subtitle">
      неофициальный минималистичный клиент для Яндекс Музыки
    </p>

    <div class="divider"></div>

    <button class="btn-auth" id="btn-auth">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Войти через Яндекс
    </button>
  </div>
   <footer class="footer-note">
     <p>© oguzokdotdev 2026 · <a href="https://github.com/oguzokdotdev/YaMusic-Legacy" target="_blank">Исходный код на GitHub</a></p>
     <p>Неофициальное приложение · Не одобрено и не связано с ООО «Яндекс»</p>
   </footer>
    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      // Автоматический вход, если токен уже существует
      (async () => {
        try {
          const token = await invoke('get_token');
          if (token) {
            window.location.href = 'index.html';
          }
        } catch (e) {
          console.error('get_token error:', e);
        }
      })();

      document.getElementById('btn-auth').addEventListener('click', () => {
        invoke('open_auth_window');
      });

      listen('auth-success', async (event) => {
        const token = event.payload;
        try {
          await invoke('save_token', { token });
        } catch (e) {
          console.error('save_token error:', e);
        }
        window.location.href = 'index.html';
      });
    </script>
</body>
</html>
